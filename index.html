<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Castelo Isométrico - Sem Grid</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0a1a0a;
            font-family: 'Segoe UI', monospace;
        }
        .container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #game-container {
            display: block;
            width: 100%;
            height: 100%;
        }
        #game-container canvas {
            display: block;
            margin: 0;
        }
        .info {
            position: absolute;
            bottom: 14px;
            left: 14px;
            background: rgba(0,0,0,0.8);
            color: #ffdf99;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 14px;
            pointer-events: none;
            z-index: 20;
            backdrop-filter: blur(6px);
            font-weight: bold;
            border-left: 4px solid #e6b422;
        }
        .controls-note {
            position: absolute;
            bottom: 14px;
            right: 14px;
            background: rgba(0,0,0,0.7);
            color: #cfd8c0;
            padding: 5px 14px;
            border-radius: 24px;
            font-size: 11px;
            pointer-events: none;
            z-index: 20;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script src="game.js"></script>
    <script src="castle.js"></script>
    <script src="grid.js"></script>
    <script src="hud.js"></script>
    <script src="start-mode.js"></script>
    <script src="twitch-config.js"></script>
    <script src="twitch-game.js"></script>
    <script src="twitch-irc-browser.js"></script>
    <script src="main.js"></script>
</head>
<body>
<div class="container">
    <div id="game-container"></div>
</div>
</body>
</html>
