# GitHub Pages — ficheiros estáticos na raiz do repositório.
# Ativa em: Settings → Pages → Build and deployment → Source: GitHub Actions
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Gerar twitch-config.js (Twitch IRC no browser — opcional)
        env:
          TWITCH_OAUTH_TOKEN: ${{ secrets.TWITCH_OAUTH_TOKEN }}
          TWITCH_BOT_USERNAME: ${{ secrets.TWITCH_BOT_USERNAME }}
          TWITCH_CHANNEL: ${{ secrets.TWITCH_CHANNEL }}
        run: |
          node <<'NODESCRIPT'
          const fs = require('fs');
          const token = (process.env.TWITCH_OAUTH_TOKEN || '').trim();
          const nick = (process.env.TWITCH_BOT_USERNAME || '').trim().toLowerCase();
          let channel = (process.env.TWITCH_CHANNEL || '').trim().toLowerCase().replace(/^#/, '');
          if (!token || !nick || !channel) {
            console.log('Secrets TWITCH_* ausentes — mantém-se twitch-config.js do repositório (IRC off).');
            process.exit(0);
          }
          const tok = token.startsWith('oauth:') ? token : 'oauth:' + token;
          const body = 'window.TWITCH_IRC_CONFIG=' + JSON.stringify({
            enabled: true,
            token: tok,
            nick,
            channel
          }) + ';\n';
          fs.writeFileSync('twitch-config.js', body);
          console.log('twitch-config.js gerado para o deploy (token fica no site — ver README).');
          NODESCRIPT

      - name: Upload artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
